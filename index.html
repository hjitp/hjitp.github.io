<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HJITP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    a {
      text-decoration: none;
    }

    .image-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .image-row img {
      display: block;
      width: 300px;
    }

    .image-row a {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: black;
      padding-bottom: 2px;
    }

    .image-row a:hover {
      color: #0000EE;
    }

    #home-link img {
      transition: filter 0.2s;
    }

    #home-link img:hover {
      filter: sepia(0.3) saturate(2) hue-rotate(190deg);
    }

    .entry {
      padding: 0.75rem 0;
      cursor: pointer;
      line-height: 1.7;
    }

    .entry:hover {
      color: #0000EE;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <div class="image-row">
    <a href="/" id="home-link">
      <img src="Header300pxbroad.jpg" alt="Exhibition image">
    </a>
    <a href="/about">About</a>
  </div>

  <main>
    <div class="entry" onclick="window.location.href='/manuelschneider'">
      Manuel Schneider<br>
      ÄNGSTLI<br>
      18.4.2026<br>
      Auf dem Wolf 11
    </div>
  </main>

</body>
</html>
