<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HJITP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    .header {
      position: relative;
    }

    .header img {
      width: 100%;
      display: block;
    }

    .header a {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: black;
      text-decoration: none;
    }

    .header a:hover {
      text-decoration: underline;
    }

    .entry {
      padding: 0.75rem 0;
      border-top: 1px solid #ccc;
      cursor: pointer;
      line-height: 1.7;
    }

    .entry:hover {
      background-color: #f5f5f5;
    }

    .entry:last-child {
      border-bottom: 1px solid #ccc;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <div class="header">
<img src="Header300pxbroad.jpg" alt="Exhibition image">
    <a href="/about">About</a>
  </div>

  <main>
    <div class="entry" onclick="window.location.href='#'">
      Manuel Schneider<br>
      ÄNGSTLI<br>
      18.4.2026<br>
      Auf dem Wolf 11
    </div>
  </main>

</body>
</html>
