<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hjitp.ch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
    }

    /* Static vertical sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100vh;
      background: #fff;
      z-index: 100;
    }

    #sidebar .header-image {
      display: block;
      width: 200px;
    }

    #sidebar .header-image img {
      width: 200px;
      display: block;
    }

    #sidebar .header-image:hover img {
      opacity: 1;
    }

    /* Nav links — indented 20px further than header image */
    #sidebar nav {
      padding-left: 20px;
      margin-top: 0;
    }

    #sidebar nav a,
    #sidebar nav .empty-line {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-style: italic;
      line-height: 1.5;
      color: #000;
      text-decoration: none;
    }

    #sidebar nav a:hover {
      color: #0000EE;
    }

    /* Main content area */
    #content {
      margin-left: 200px;
      padding-left: 20px;
      padding-top: 20px;
    }

    /* Mobile: index shows only the sidebar */
    @media (max-width: 600px) {
      #sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      #sidebar .header-image img {
        width: 200px;
      }

      #content {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <a class="header-image" href="/">
      <img src="Header200pxbroad.jpg" alt="hjitp.ch">
    </a>
    <nav>
      <a href="aengstli.html">ÄNGSTLI</a>
      <span class="empty-line">&nbsp;</span>
      <a href="about.html">About</a>
    </nav>
  </div>

  <div id="content">
  </div>

</body>
</html>
