<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter – hjitp.ch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
    }

    /* Static vertical sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #fff;
      z-index: 100;
    }

    #sidebar .header-image {
      display: block;
      width: 280px;
    }

    #sidebar .header-image img {
      width: 280px;
      display: block;
    }

    /* Nav links — indented 20px further than header image */
    #sidebar nav {
      padding-left: 20px;
    }

    #sidebar nav a,
    #sidebar nav .empty-line {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-style: italic;
      line-height: 1.5;
      color: #000;
      text-decoration: none;
    }

    #sidebar nav a:hover {
      color: #0000EE;
      text-decoration: underline;
    }

    /* Main content area */
    #content {
      margin-left: 280px;
      padding-left: 20px;
      padding-top: 20px;
    }

    /* Type Style 2: Arial, 14px, regular, line-height 1.1, max-width 400px */
    .type2 {
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-style: normal;
      font-weight: normal;
      line-height: 1.1;
      color: #000;
      max-width: 400px;
    }

    .block {
      margin-bottom: 1.1em;
    }

    /* Mobile: hide sidebar nav, show header image above content */
    @media (max-width: 600px) {
      #sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      #sidebar .header-image img {
        width: 280px;
      }

      #sidebar nav {
        display: none;
      }

      #content {
        margin-left: 0;
        padding-left: 20px;
        padding-top: 20px;
      }

      .type2 {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="sidebar"></div>

  <script src="sidebar.js"></script>

  <div id="content">

    <form action="https://formspree.io/f/xeedwnpy" method="POST">

      <!-- 1st Type-2-Paragraph — email input line -->
      <div class="block type2">
        <input type="email" name="email" placeholder="E-Mail" required
          style="font-family: Arial, sans-serif; font-size: 15px; line-height: 1.1; color: #000; background: transparent; border: none; border-bottom: 1px solid #000; outline: none; width: 280px; padding: 2px 0;">
        <input type="text" name="_gotcha" style="display: none;">
      </div>

      <!-- 2nd Type-2-Paragraph — subscribe button styled as hyperlink -->
      <div class="block type2">
        <button type="submit"
          style="font-family: Arial, sans-serif; font-size: 15px; line-height: 1.1; background: none; border: none; padding: 0; cursor: pointer; color: #0000EE; text-decoration: underline;">Subscribe</button>
      </div>

    </form>

  </div>

</body>
</html>
