<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter – hjitp.ch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
    }

    /* Static vertical sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #fff;
      z-index: 100;
    }

    #sidebar .header-image {
      display: block;
      width: 280px;
    }

    #sidebar .header-image img {
      width: 280px;
      display: block;
    }

    /* Nav links — indented 20px further than header image */
    #sidebar nav {
      padding-left: 20px;
    }

    #sidebar nav a,
    #sidebar nav .empty-line {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-style: italic;
      line-height: 1.5;
      color: #000;
      text-decoration: none;
    }

    #sidebar nav a:hover {
      color: #0000EE;
      text-decoration: underline;
    }

    /* Main content area */
    #content {
      margin-left: 280px;
      padding-left: 20px;
      padding-top: 20px;
    }

    /* Type Style 2: Arial, 14px, regular, line-height 1.1 */
    .type2 {
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-style: normal;
      font-weight: normal;
      line-height: 1.1;
      color: #000;
      max-width: 400px;
    }

    /* Spacing between paragraphs and images matches paragraph spacing */
    .block {
      margin-bottom: 1.1em;
    }

    /* Chapter links: always blue + underline */
    .block a {
      color: #0000EE;
      text-decoration: underline;
    }

    .block a:hover {
      color: #0000EE;
      text-decoration: underline;
    }

    /* Images at their natural width */
    .block img {
      display: block;
      width: 800px;
      max-width: 100%;
    }

    /* Videos — same width as images, no controls */
    .block video {
      display: block;
      width: 800px;
      max-width: 100%;
    }

    /* Mobile: hide sidebar nav, show header image above content */
    @media (max-width: 600px) {
      #sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      #sidebar .header-image img {
        width: 280px;
      }

      #sidebar nav {
        display: none;
      }

      #content {
        margin-left: 0;
        padding-left: 0;
        padding-top: 20px;
      }

      .type2 {
        max-width: 100%;
        padding: 0 20px;
      }

      .block img,
      .block video {
        width: 100vw;
        max-width: 100vw;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <div id="sidebar"></div>

  <script src="sidebar.js"></script>

  <div id="content">

    <!-- 1st Type-2-Paragraph -->
    <div class="block type2">
      Rafael Jörger<br>
      <i>Filter</i><br>
      23.5. - 6.6.2026<br>
      Opening 23.5.2026 18 - 22<br>
      Auf dem Wolf 11, Basel
    </div>

    <!-- 2nd Type-2-Paragraph -->
    <div class="block type2">
      To make an appointment please contact us via <a href="mailto:hjitp@hjitp.ch">email</a>.
    </div>

    <!-- 3rd Type-2-Paragraph — PDF links -->
    <div class="block type2">
      <a href="exhibitiontextfilter.pdf">Exhibition text</a><br>
      <a href="infosheetfilter.pdf">Info sheet</a><br>
      <a href="MSRJFlyer.pdf">Exhibition Flyer</a>
    </div>

    <!-- 4th Type-2-Paragraph -->
    <div class="block type2">
      Photos by Rafael Jörger
    </div>

    <!-- Images — max 800px -->
    <div class="block"><img src="2.jpg" alt=""></div>
    <div class="block"><img src="3.jpg" alt=""></div>
    <div class="block"><img src="5.jpg" alt=""></div>
    <div class="block"><img src="7.jpg" alt=""></div>
    <div class="block"><img src="8.jpg" alt=""></div>
    <div class="block"><img src="9.jpg" alt=""></div>
    <div class="block"><img src="10.jpg" alt=""></div>
    <div class="block"><img src="11.jpg" alt=""></div>
    <div class="block"><img src="12.jpg" alt=""></div>
    <div class="block"><img src="13.jpg" alt=""></div>
    <div class="block"><img src="14.jpg" alt=""></div>
    <div class="block"><img src="15.jpg" alt=""></div>
    <div class="block"><img src="16.jpg" alt=""></div>
    <div class="block"><img src="17.jpg" alt=""></div>
    <div class="block"><img src="20.jpg" alt=""></div>
    <div class="block"><img src="21.jpg" alt=""></div>

    <!-- 5th Type-2-Paragraph -->
    <div class="block type2">
      Videos by Hjitp, Dollies shot at 6:30 and 20:30
    </div>

    <!-- Videos — autoplay, loop, muted, no controls -->
    <div class="block">
      <video autoplay loop muted playsinline>
        <source src="rjfilter630amsmall2.mp4" type="video/mp4">
      </video>
    </div>
    <div class="block">
      <video autoplay loop muted playsinline>
        <source src="rjfilter830pm2small.mp4" type="video/mp4">
      </video>
    </div>

  </div>

</body>
</html>
